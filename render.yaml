services:
  - type: web
    name: drcvetanov1
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: drcvetanov1.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://drcvetanov1.onrender.com
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: drcvetanov1-db
          property: connectionString

databases:
  - name: drcvetanov1-db
    plan: free
