services:
  - type: web
    name: dr-georgi-tsvetanov
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: dr-georgi-tsvetanov.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://dr-georgi-tsvetanov.onrender.com
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dr-georgi-tsvetanov-db
          property: connectionString

databases:
  - name: dr-georgi-tsvetanov-db
    plan: free
